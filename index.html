    <!-- Primary SEO -->

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:url" content="https://formula1points.netlify.app/" />
    <meta name="twitter:title" content="Formula 1 Points Tracker | F1 Standings & Race Results" />
    <meta name="twitter:description" content="Track live F1 championship standings, full race and qualifying results archive from 2018 through the current season, and the complete F1 race schedule." />

    <!-- JSON-LD Structured Data -->
    <script id="ld-json" type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@graph": [
        {
          "@type": "WebApplication",
          "name": "Formula 1 Points Tracker",
          "url": "https://formula1points.netlify.app",
          "description": "Track Formula 1 championship standings, race and qualifying results from 2018 through the current season, and the full F1 race calendar.",
          "applicationCategory": "SportsApplication",
          "operatingSystem": "Web",
          "offers": {
            "@type": "Offer",
            "price": "0",
            "priceCurrency": "USD"
          },
          "author": {
            "@type": "Person",
            "name": "Mouncef"
          }
        },
        {
          "@type": "BreadcrumbList",
          "itemListElement": [
            {
              "@type": "ListItem",
              "position": 1,
              "name": "Home",
              "item": "https://formula1points.netlify.app/"
            },
            {
              "@type": "ListItem",
              "position": 2,
              "name": "Sessions",
              "item": "https://formula1points.netlify.app/sessions"
            },
            {
              "@type": "ListItem",
              "position": 3,
              "name": "Schedule",
              "item": "https://formula1points.netlify.app/schedule"
            }
          ]
        }
      ]
    }
    </script>

    <!-- Inject current year into title and JSON-LD at runtime -->
    <script>
      (function () {
        const year = new Date().getFullYear();

        document.title = `Formula 1 Points Tracker | F1 Standings, Race Results 2018\u2013${year} & Schedule`;

        const ldScript = document.getElementById("ld-json");
        if (ldScript) {
          const data = JSON.parse(ldScript.textContent);
          data[0].description = `Track Formula 1 championship standings, race and qualifying results from 2018 through the ${year} season, and the full ${year} F1 race calendar.`;
          ldScript.textContent = JSON.stringify(data, null, 2);
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
