    <!-- Primary SEO -->
    <title>Formula 1 Points Tracker | F1 Standings, Race Results 2018–Present & Current Schedule</title>

    <meta name="author" content="Mouncef" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://formula1points.netlify.app/" />

    <!-- Open Graph (Facebook, LinkedIn, WhatsApp) -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://formula1points.netlify.app/" />
    <meta property="og:title" content="Formula 1 Points Tracker | F1 Standings & Race Results" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />

    <meta name="twitter:title" content="Formula 1 Points Tracker | F1 Standings & Race Results" />

    <meta name="twitter:image" content="https://formula1points.netlify.app/F1.png" />

    <!-- JSON-LD Structured Data (year injected dynamically below) -->
    <script id="ld-json" type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebApplication",
      "name": "Formula 1 Points Tracker",
      "url": "https://formula1points.netlify.app",
      "description": "Track Formula 1 championship standings, race and qualifying results from 2018 through the current season, and the full F1 race calendar.",
      "applicationCategory": "SportsApplication",
      "operatingSystem": "Web",
      "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "USD"
      }
    }
    </script>

    <!-- Inject current year into title and JSON-LD at runtime -->
    <script>
      (function () {
        const year = new Date().getFullYear();

        // Update page title with real current year
        document.title = `Formula 1 Points Tracker | F1 Standings, Race Results 2018\u2013${year} & Schedule`;

        // Update JSON-LD description with real current year
        const ldScript = document.getElementById("ld-json");
        if (ldScript) {
          const data = JSON.parse(ldScript.textContent);
          data.description = `Track Formula 1 championship standings, race and qualifying results from 2018 through the ${year} season, and the full ${year} F1 race calendar.`;
          ldScript.textContent = JSON.stringify(data, null, 2);
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
